<svg width="640" height="180" viewBox="0 0 640 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spaceGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00FFA3"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Planet -->
  <circle cx="90" cy="90" r="38" stroke="url(#spaceGradient)" stroke-width="8" fill="#0B1020"/>

  <!-- Orbit -->
  <ellipse cx="90" cy="90" rx="62" ry="22"
           stroke="url(#spaceGradient)"
           stroke-width="5"
           transform="rotate(-18 90 90)"
           filter="url(#glow)"/>

  <!-- Orbit Dot -->
  <circle cx="148" cy="68" r="7" fill="#00D4FF"/>

  <!-- Brand Name -->
  <text x="180" y="105"
        font-family="Segoe UI, Inter, Arial, sans-serif"
        font-size="56"
        font-weight="700"
        fill="url(#spaceGradient)"
        letter-spacing="1">
    SpaceUX
  </text>
</svg>
