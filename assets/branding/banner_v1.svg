<svg width="640" height="180" viewBox="0 0 640 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spaceGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00FFA3"/>
    </linearGradient>
  </defs>

  <!-- Planet -->
  <circle cx="90" cy="90" r="38" stroke="url(#spaceGradient)" stroke-width="8" fill="none"/>

  <!-- Orbit -->
  <ellipse cx="90" cy="90" rx="62" ry="22"
           stroke="url(#spaceGradient)"
           stroke-width="5"
           transform="rotate(-18 90 90)"
           fill="none"/>

  <!-- Brand Name -->
  <text x="180" y="105"
        font-family="Segoe UI, Inter, Arial, sans-serif"
        font-size="56"
        font-weight="700"
        fill="url(#spaceGradient)"
        letter-spacing="1">
    SpaceUI/UX
  </text>

  <!-- Subtitle -->
  <text x="183" y="135"
        font-family="Segoe UI, Inter, Arial, sans-serif"
        font-size="18"
        fill="#94A3B8"
        letter-spacing="4">
    FUTURE INTERFACES
  </text>
</svg>
