<!--
  Tray icon, active state (#199): desktop mode engaged via the toggle button.
  The inverse of tray-icon.svg, a filled gradient tile with a dark planet ring +
  orbit. Scalable; resolved flat via IconThemePath. No clipPath (rounded via the
  rect's rx, gradient via userSpaceOnUse) so QSvgRenderer draws it correctly.
-->
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spaceGradient" gradientUnits="userSpaceOnUse" x1="0" y1="0" x2="1024" y2="1024">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00FFA3"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="120" fill="url(#spaceGradient)"/>
  <circle cx="512" cy="512" r="240" stroke="#070B16" stroke-width="36" fill="none"/>
  <ellipse cx="512" cy="512" rx="390" ry="145" transform="rotate(-18 512 512)"
           stroke="#070B16" stroke-width="26" fill="none"/>
</svg>
