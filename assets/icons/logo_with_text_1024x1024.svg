<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spaceGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00FFA3"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="120" fill="#070B16"/>

  <!-- Planet -->
  <circle cx="280" cy="420" r="110"
          stroke="url(#spaceGradient)"
          stroke-width="22"
          fill="#0B1020"/>

  <!-- Orbit -->
  <ellipse cx="280" cy="420"
           rx="180" ry="65"
           transform="rotate(-18 280 420)"
           stroke="url(#spaceGradient)"
           stroke-width="16"
           filter="url(#glow)"/>

  <!-- Orbit Dot -->
  <circle cx="445" cy="350" r="18" fill="#00D4FF"/>

  <!-- Brand -->
  <text x="180"
        y="700"
        font-family="Segoe UI, Inter, Arial, sans-serif"
        font-size="140"
        font-weight="700"
        fill="url(#spaceGradient)"
        letter-spacing="2">
    SpaceUX
  </text>
</svg>
