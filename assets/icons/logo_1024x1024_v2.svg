<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="spaceGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C4DFF"/>
      <stop offset="50%" stop-color="#00D4FF"/>
      <stop offset="100%" stop-color="#00FFA3"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="120" fill="#070B16"/>

  <!-- Centered Logo -->
  <g transform="translate(512 512)">

    <!-- Planet -->
    <circle cx="0"
            cy="0"
            r="240"
            stroke="url(#spaceGradient)"
            stroke-width="36"
            fill="#0B1020"/>

    <!-- Orbit -->
    <ellipse id="orbit"
             cx="0"
             cy="0"
             rx="390"
             ry="145"
             transform="rotate(-18)"
             stroke="url(#spaceGradient)"
             stroke-width="26"
             fill="none"
             filter="url(#glow)"/>

    <!-- Orbiting Dot -->
    <circle r="34" fill="#00D4FF">
      <animateMotion dur="8s"
                     repeatCount="indefinite"
                     rotate="auto">
        <mpath xlink:href="#orbit"/>
      </animateMotion>
    </circle>

  </g>
</svg>
