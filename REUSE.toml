#
# REUSE specification metadata. Every source file in this repository
# carries its own SPDX header; this file backfills coverage for asset
# directories and generated artefacts where per-file headers are
# impractical. See https://reuse.software/ for the full spec.

version = 1

# JSON files cannot carry inline SPDX comments — JSON has no comment
# syntax — so REUSE.toml backfills their copyright + license here.
# Anything globbed below must still trace back to GPL-3.0-or-later
# (the project licence) so per-file licence claims stay honest.
[[annotations]]
path = [
  "package.json",
  "tsconfig.json",
  "tsconfig.electron.json",
  ".prettierrc.json",
  "extensions/**/manifest.json",
]
precedence = "aggregate"
SPDX-FileCopyrightText = "Maik-0000FF"
SPDX-License-Identifier = "GPL-3.0-or-later"

# Binary raster assets cannot carry an inline SPDX header. The tray and
# window icons are rendered from the project logo (assets/icons/*.svg),
# so they inherit the same CC-BY-4.0 branding licence as their source.
[[annotations]]
path = ["assets/tray-icon.png", "assets/tray-icon@2x.png", "assets/icon.png"]
precedence = "aggregate"
SPDX-FileCopyrightText = "Maik-0000FF"
SPDX-License-Identifier = "CC-BY-4.0"
