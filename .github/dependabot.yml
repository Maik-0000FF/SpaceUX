# Keeps the SHA-pinned GitHub Actions and the npm dependencies current: without
# this, pinning freezes them on stale (possibly vulnerable) versions. The
# lockfile is gitignored, so npm updates run against package.json in the root.
version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: ci
    groups:
      # One PR per week for routine action bumps instead of many.
      actions:
        patterns: ['*']

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps
    ignore:
      # Major upgrades that need a coordinated, tested migration rather than an
      # auto-bump. Drop the entry when you tackle the upgrade deliberately.
      - dependency-name: 'vitest'
        update-types: ['version-update:semver-major']
      # Keep the Node type definitions aligned with the Node 22 runtime the app
      # targets; still take 22.x minors and patches.
      - dependency-name: '@types/node'
        update-types: ['version-update:semver-major']
