name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new push lands on the same branch — the
# old run is already obsolete by the time we look at it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── TypeScript + Vitest ────────────────────────────────────────────
  # The TS half of the project. Typecheck both compilation roots
  # (renderer via tsconfig.json, Electron main via tsconfig.electron.json)
  # so a type error in either surfaces on the same job.

  typescript:
    name: typescript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          # Lockfile is gitignored intentionally — see project decision.
          # That means we can't use the built-in npm cache (it keys off
          # the lockfile hash), so the install resolves dependencies
          # fresh each run. The trade-off is documented in .gitignore.
      - run: npm install --no-audit --no-fund
      - name: Typecheck
        run: |
          npx tsc -b
          npx tsc -p tsconfig.electron.json --noEmit
      - name: Vitest
        run: npm test

  # ─── Daemon C build ─────────────────────────────────────────────────
  # Builds via CMake against the distro toolchain — proves the daemon
  # compiles cleanly under both gcc and clang. -Werror is added via
  # CMAKE_C_FLAGS so a new warning fails the build instead of slipping
  # through; the local dev configure does not enable it so working on
  # a fresh compiler version stays comfortable.

  daemon:
    name: daemon (gcc + clang)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.cc }} cmake
      - name: Configure
        run: cmake -S . -B build/daemon -DCMAKE_C_COMPILER=${{ matrix.cc }} -DCMAKE_C_FLAGS=-Werror
      - name: Build
        run: cmake --build build/daemon

  # ─── Formatting ─────────────────────────────────────────────────────
  # Two formatters, one per language family. Both run in --check mode
  # so the CI fails on drift but never silently rewrites the tree —
  # contributors fix locally with `npm run format` / `clang-format -i`.

  format-js:
    name: prettier (check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - run: npm install --no-audit --no-fund
      - run: npm run format:check

  format-c:
    name: clang-format (check)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang-format
      - name: Check formatting
        # --dry-run + --Werror promotes "would reformat" warnings into
        # a non-zero exit so the job fails on any drift.
        run: clang-format --dry-run --Werror src/daemon/*.c src/daemon/*.h

  # ─── REUSE compliance ──────────────────────────────────────────────
  # Verifies every file has an SPDX header (or a sidecar .license file)
  # so the per-file licensing claim in REUSE.toml stays honest.

  reuse:
    name: reuse lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: fsfe/reuse-action@v6

  # ─── Secret scanning ───────────────────────────────────────────────
  # gitleaks scans the full history for accidental secrets (API keys,
  # tokens, credentials). Run the CLI directly instead of going through
  # gitleaks/gitleaks-action@v2 — that action still ships Node 20 which
  # GitHub is deprecating, and direct invocation drops a third-party
  # supply-chain dependency at the same time. Same ruleset, same result.

  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    # Pin gitleaks so a surprise upstream change can't break or relax CI.
    # Bump deliberately by checking the latest release and updating here.
    env:
      GITLEAKS_VERSION: 8.30.1
    steps:
      - uses: actions/checkout@v5
        with:
          # Full history needed so gitleaks can scan every commit, not
          # just the most recent tree.
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSLf "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan
        # --redact masks any finding in the report (safe to read on a public log).
        # --report-format sarif uploads as a code-scanning artefact below.
        # No custom config: CI uses the upstream default ruleset, which is
        # explicitly NOT the AI-attribution-strict variant some contributors
        # may run locally. See project README for the rationale.
        run: |
          gitleaks git . \
            --redact \
            --no-banner \
            --verbose \
            --report-format sarif \
            --report-path gitleaks.sarif
      - name: Upload SARIF report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gitleaks-results.sarif
          path: gitleaks.sarif
