name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-flight runs when a new push lands on the same branch — the
# old run is already obsolete by the time we look at it.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─── TypeScript + Vitest ────────────────────────────────────────────
  # The TS half of the project. Typecheck both compilation roots
  # (renderer via tsconfig.json, Electron main via tsconfig.electron.json)
  # so a type error in either surfaces on the same job.

  typescript:
    name: typescript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          # Lockfile is gitignored intentionally — see project decision.
          # That means we can't use the built-in npm cache (it keys off
          # the lockfile hash), so the install resolves dependencies
          # fresh each run. The trade-off is documented in .gitignore.
      - run: npm install --no-audit --no-fund
      - name: Typecheck
        run: |
          npx tsc -b
          npx tsc -p tsconfig.electron.json --noEmit
      - name: Vitest
        run: npm test

  # ─── Daemon C build ─────────────────────────────────────────────────
  # Builds against the distro toolchain — proves the daemon compiles
  # cleanly without any TypeScript / Node baggage. Warnings are
  # promoted to errors so a regression in -Wall / -Wextra fails the
  # build instead of slipping through.

  daemon:
    name: daemon (gcc + clang)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        cc: [gcc, clang]
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ${{ matrix.cc }} make
      - name: Build daemon
        run: make -C src/daemon CC=${{ matrix.cc }} EXTRA_CFLAGS="-Werror"

  # ─── REUSE compliance ──────────────────────────────────────────────
  # Verifies every file has an SPDX header (or a sidecar .license file)
  # so the per-file licensing claim in REUSE.toml stays honest.

  reuse:
    name: reuse lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: fsfe/reuse-action@v6
